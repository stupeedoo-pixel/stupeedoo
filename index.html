<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will u be my valentine 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:    #c2547a;
      --blush:   #f2a7c3;
      --cream:   #fff5f8;
      --petal:   #fde0eb;
      --dusty:   #e8a0b8;
      --deep:    #9b3060;
      --lace:    #fce8f0;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 15% 10%, #ffd6e7 0%, transparent 45%),
        radial-gradient(ellipse at 85% 85%, #f9c0d8 0%, transparent 45%),
        url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23f2a7c3' fill-opacity='0.12'%3E%3Ccircle cx='10' cy='10' r='2'/%3E%3Ccircle cx='40' cy='10' r='2'/%3E%3Ccircle cx='70' cy='10' r='2'/%3E%3Ccircle cx='25' cy='30' r='2'/%3E%3Ccircle cx='55' cy='30' r='2'/%3E%3Ccircle cx='10' cy='50' r='2'/%3E%3Ccircle cx='40' cy='50' r='2'/%3E%3Ccircle cx='70' cy='50' r='2'/%3E%3Ccircle cx='25' cy='70' r='2'/%3E%3Ccircle cx='55' cy='70' r='2'/%3E%3C/g%3E%3C/svg%3E");
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* floating decorative bows */
    .deco-bow {
      position: fixed;
      pointer-events: none;
      opacity: 0.18;
      animation: floatDeco linear infinite;
    }

    @keyframes floatDeco {
      0%   { transform: translateY(0)   rotate(0deg); }
      50%  { transform: translateY(-18px) rotate(6deg); }
      100% { transform: translateY(0)   rotate(0deg); }
    }

    /* lace strip top & bottom */
    body::before, body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 18px;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='18' viewBox='0 0 40 18' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 Q10 18 20 0 Q30 18 40 0' fill='none' stroke='%23e8a0b8' stroke-width='1.8'/%3E%3Ccircle cx='0'  cy='0' r='2' fill='%23e8a0b8'/%3E%3Ccircle cx='20' cy='0' r='2' fill='%23e8a0b8'/%3E%3Ccircle cx='40' cy='0' r='2' fill='%23e8a0b8'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      z-index: 50;
    }
    body::before { top: 0; }
    body::after  { bottom: 0; transform: scaleY(-1); }

    /* ── CARD ── */
    .card {
      background: white;
      border-radius: 36px;
      padding: 52px 56px 48px;
      text-align: center;
      max-width: 460px;
      width: 100%;
      position: relative;
      box-shadow:
        0 2px 0 var(--dusty),
        0 6px 30px rgba(194, 84, 122, 0.14),
        0 1px 4px rgba(194, 84, 122, 0.08);
      border: 2px solid var(--petal);
    }

    /* lace border around card */
    .card::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 30px;
      border: 1.5px dashed var(--dusty);
      opacity: 0.45;
      pointer-events: none;
    }

    /* top ribbon stripe */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 4px;
      background: linear-gradient(90deg, var(--blush), var(--rose), var(--blush));
      border-radius: 0 0 4px 4px;
    }

    /* big bow on top of card */
    .card-bow {
      position: absolute;
      top: -38px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Hello Kitty */
    .kitty { width: 128px; height: 128px; margin: 8px auto 18px; display: block; }

    /* tag line above title */
    .tag {
      font-family: 'Dancing Script', cursive;
      color: var(--blush);
      font-size: 1rem;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--rose);
      font-size: 1.85rem;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Dancing Script', cursive;
      color: var(--dusty);
      font-size: 1.05rem;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e8759e, var(--rose));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 13px 34px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(194, 84, 122, 0.32), 0 1px 0 #9b3060;
      transition: transform 0.15s, box-shadow 0.15s, font-size 0.3s ease, padding 0.3s ease;
      position: relative;
      z-index: 2;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .btn-yes:hover { transform: scale(1.06) translateY(-1px); box-shadow: 0 7px 22px rgba(194,84,122,0.38), 0 1px 0 #9b3060; }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      background: white;
      color: var(--dusty);
      border: 1.5px solid var(--petal);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-no:hover { background: var(--lace); color: var(--rose); transform: scale(0.97); }

    /* corner roses */
    .corner {
      position: absolute;
      font-size: 1.15rem;
      opacity: 0.55;
      line-height: 1;
    }
    .corner.tl { top: 18px;  left: 20px; }
    .corner.tr { top: 18px;  right: 20px; }
    .corner.bl { bottom: 18px; left: 20px; }
    .corner.br { bottom: 18px; right: 20px; }

    /* ── CELEBRATION ── */
    .fullscreen-yes {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #f9d0e2 0%, #f2a7c3 40%, #d96890 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      padding: 24px;
    }

    .fullscreen-yes .cel-bow { margin-bottom: 10px; }

    .fullscreen-yes .big-kitty {
      width: 180px; height: 180px;
      margin-bottom: 24px;
      animation: bobble 1s ease-in-out infinite alternate;
    }

    .fullscreen-yes h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: white;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      text-shadow: 0 2px 16px rgba(155, 48, 96, 0.25);
      margin-bottom: 10px;
    }

    .fullscreen-yes p {
      font-family: 'Dancing Script', cursive;
      color: rgba(255,255,255,0.92);
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
    }

    .hearts-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1000;
    }
    .heart-drop {
      position: absolute;
      top: -60px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(115vh) rotate(25deg); opacity: 0; }
    }
    @keyframes popIn {
      from { transform: scale(0.4) rotate(-4deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }
    @keyframes bobble {
      from { transform: translateY(0)    rotate(-2deg); }
      to   { transform: translateY(-12px) rotate(2deg); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- floating bg bows -->
  <svg class="deco-bow" style="width:90px;top:8%;left:4%;animation-duration:6s;" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><path d="M40,20 L10,4 L14,20 L10,36Z" fill="#e8759e"/><path d="M40,20 L70,4 L66,20 L70,36Z" fill="#e8759e"/><circle cx="40" cy="20" r="7" fill="#c2547a"/></svg>
  <svg class="deco-bow" style="width:60px;top:12%;right:6%;animation-duration:8s;animation-delay:-3s;" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><path d="M40,20 L10,4 L14,20 L10,36Z" fill="#f2a7c3"/><path d="M40,20 L70,4 L66,20 L70,36Z" fill="#f2a7c3"/><circle cx="40" cy="20" r="7" fill="#e8759e"/></svg>
  <svg class="deco-bow" style="width:70px;bottom:14%;left:7%;animation-duration:7s;animation-delay:-1s;" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><path d="M40,20 L10,4 L14,20 L10,36Z" fill="#c2547a"/><path d="M40,20 L70,4 L66,20 L70,36Z" fill="#c2547a"/><circle cx="40" cy="20" r="7" fill="#9b3060"/></svg>
  <svg class="deco-bow" style="width:55px;bottom:10%;right:5%;animation-duration:9s;animation-delay:-4s;" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><path d="M40,20 L10,4 L14,20 L10,36Z" fill="#f2a7c3"/><path d="M40,20 L70,4 L66,20 L70,36Z" fill="#f2a7c3"/><circle cx="40" cy="20" r="7" fill="#e8759e"/></svg>

  <div class="card" id="card">
    <!-- big bow on top -->
    <svg class="card-bow" width="96" height="52" viewBox="0 0 96 52" xmlns="http://www.w3.org/2000/svg">
      <path d="M48,26 L8,6  L13,26 L8,46Z"  fill="#e8759e"/>
      <path d="M48,26 L88,6 L83,26 L88,46Z" fill="#e8759e"/>
      <ellipse cx="48" cy="26" rx="10" ry="9" fill="#c2547a"/>
      <ellipse cx="48" cy="26" rx="5"  ry="4" fill="#f2a7c3"/>
    </svg>

    <!-- corner roses -->
    <span class="corner tl">🌸</span>
    <span class="corner tr">🌸</span>
    <span class="corner bl">🍒</span>
    <span class="corner br">🍒</span>

    <!-- Hello Kitty -->
    <svg class="kitty" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="48" rx="26" ry="28" fill="white" stroke="#f2a7c3" stroke-width="2.5"/>
      <ellipse cx="140" cy="48" rx="26" ry="28" fill="white" stroke="#f2a7c3" stroke-width="2.5"/>
      <ellipse cx="60" cy="52" rx="13" ry="15" fill="#fde0eb"/>
      <ellipse cx="140" cy="52" rx="13" ry="15" fill="#fde0eb"/>
      <ellipse cx="100" cy="115" rx="76" ry="72" fill="white" stroke="#f2a7c3" stroke-width="2.5"/>
      <ellipse cx="78" cy="108" rx="8" ry="9" fill="#2d2d2d"/>
      <ellipse cx="122" cy="108" rx="8" ry="9" fill="#2d2d2d"/>
      <circle cx="82" cy="104" r="3" fill="white"/>
      <circle cx="126" cy="104" r="3" fill="white"/>
      <ellipse cx="100" cy="122" rx="5" ry="3.5" fill="#e8759e"/>
      <ellipse cx="72" cy="134" rx="13" ry="7" fill="#fde0eb" opacity="0.7"/>
      <ellipse cx="128" cy="134" rx="13" ry="7" fill="#fde0eb" opacity="0.7"/>
      <line x1="22" y1="116" x2="88" y2="121" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="126" x2="88" y2="125" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="136" x2="88" y2="129" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="178" y1="116" x2="112" y2="121" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="178" y1="126" x2="112" y2="125" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="178" y1="136" x2="112" y2="129" stroke="#ddd" stroke-width="1.8" stroke-linecap="round"/>
      <!-- big elaborate bow -->
      <g transform="translate(130, 66)">
        <path d="M0,0 L22,-13 L26,0 L22,13Z" fill="#c2547a"/>
        <path d="M0,0 L-22,-13 L-26,0 L-22,13Z" fill="#c2547a"/>
        <ellipse cx="0" cy="0" rx="9" ry="8" fill="#e8759e"/>
        <ellipse cx="0" cy="0" rx="4" ry="3.5" fill="#fde0eb"/>
      </g>
    </svg>

    <p class="tag">♡ a little note for you ♡</p>
    <h1>Will u be my valentine 💕</h1>
    <p class="subtitle">pretty please, with a cherry on top 🍒</p>

    <div class="buttons">
      <button class="btn-yes" id="btnYes" onclick="sayYes()">Yes, of course 💖</button>
      <button class="btn-no"  id="btnNo"  onclick="sayNo()">no…</button>
    </div>
  </div>

  <!-- Celebration -->
  <div class="fullscreen-yes hidden" id="celebration">
    <div class="hearts-rain" id="heartsRain"></div>

    <svg class="cel-bow" width="120" height="64" viewBox="0 0 96 52" xmlns="http://www.w3.org/2000/svg">
      <path d="M48,26 L8,6  L13,26 L8,46Z"  fill="white" opacity="0.85"/>
      <path d="M48,26 L88,6 L83,26 L88,46Z" fill="white" opacity="0.85"/>
      <ellipse cx="48" cy="26" rx="10" ry="9" fill="#fde0eb"/>
      <ellipse cx="48" cy="26" rx="5"  ry="4" fill="white"/>
    </svg>

    <!-- Happy Kitty -->
    <svg class="big-kitty" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="48" rx="26" ry="28" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <ellipse cx="140" cy="48" rx="26" ry="28" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <ellipse cx="60" cy="52" rx="13" ry="15" fill="#fde0eb"/>
      <ellipse cx="140" cy="52" rx="13" ry="15" fill="#fde0eb"/>
      <ellipse cx="100" cy="115" rx="76" ry="72" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <!-- happy curved eyes -->
      <path d="M69,110 Q78,100 87,110" stroke="#2d2d2d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M113,110 Q122,100 131,110" stroke="#2d2d2d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="100" cy="123" rx="5" ry="3.5" fill="#e8759e"/>
      <ellipse cx="72"  cy="136" rx="14" ry="8" fill="#fde0eb" opacity="0.65"/>
      <ellipse cx="128" cy="136" rx="14" ry="8" fill="#fde0eb" opacity="0.65"/>
      <line x1="22" y1="116" x2="88" y2="121" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="126" x2="88" y2="125" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="178" y1="116" x2="112" y2="121" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="178" y1="126" x2="112" y2="125" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
      <g transform="translate(130, 66)">
        <path d="M0,0 L22,-13 L26,0 L22,13Z" fill="white" opacity="0.9"/>
        <path d="M0,0 L-22,-13 L-26,0 L-22,13Z" fill="white" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="9" ry="8" fill="#fde0eb"/>
        <ellipse cx="0" cy="0" rx="4" ry="3.5" fill="white"/>
      </g>
    </svg>

    <h2>yay!! she said yes 🎀</h2>
    <p>you're my dearest valentine, forever & always ♡</p>
  </div>

  <script>
    let noCount = 0;
    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');

    const noPhrases = [
      'no…', 'are you sure? 🥺', 'please reconsider 🌸',
      'but i made u a bow 🎀', 'this is breaking my heart 💔',
      'kitty is crying rn 😿', 'PLEASE 🥺🥺🥺', 'ur literally my everything'
    ];

    function sayNo() {
      noCount++;
      btnNo.textContent = noPhrases[Math.min(noCount, noPhrases.length - 1)];

      const fontSize = 1 + noCount * 0.28;
      const padV     = 13 + noCount * 7;
      const padH     = 34 + noCount * 16;

      btnYes.style.fontSize    = fontSize + 'rem';
      btnYes.style.padding     = padV + 'px ' + padH + 'px';

      if (noCount >= 8) {
        btnYes.style.position     = 'fixed';
        btnYes.style.inset        = '0';
        btnYes.style.width        = '100vw';
        btnYes.style.height       = '100vh';
        btnYes.style.fontSize     = '3.5rem';
        btnYes.style.borderRadius = '0';
        btnYes.style.zIndex       = '100';
        btnYes.style.padding      = '0';
        btnYes.style.fontStyle    = 'italic';
        btnYes.textContent        = 'Yes, of course 💖 (u had no choice, darling)';
        btnNo.style.display       = 'none';
      }
    }

    function sayYes() {
      document.getElementById('card').classList.add('hidden');
      document.getElementById('celebration').classList.remove('hidden');
      spawnDrops();
    }

    function spawnDrops() {
      const container = document.getElementById('heartsRain');
      const items = ['💖','🎀','🌸','🍒','💕','✨','🪷','💗','🎀','🌷'];
      for (let i = 0; i < 45; i++) {
        const el = document.createElement('span');
        el.className = 'heart-drop';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        el.style.left        = Math.random() * 100 + 'vw';
        el.style.fontSize    = (1 + Math.random() * 2) + 'rem';
        const dur = 2.8 + Math.random() * 3.2;
        el.style.animationDuration = dur + 's';
        el.style.animationDelay   = (Math.random() * 2.5) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), (dur + 3) * 1000);
      }
      setTimeout(spawnDrops, 3200);
    }
  </script>
</body>
</html>
